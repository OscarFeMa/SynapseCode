name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest httpx
    
    - name: Create .env for tests
      run: |
        cp .env.example .env
    
    - name: Run import tests
      run: |
        python -c "
        import sys; sys.path.insert(0, '.')
        from backend.config import get_settings
        from backend.database.models import SequentialDebate
        from backend.engine.debate_models import DebateSession
        from backend.engine.sequential_debate_controller import SequentialDebateController
        from backend.main import app
        print('[PASS] All imports OK')
        "
    
    - name: Run API tests
      run: |
        pip install pytest
        python -m pytest backend/tests/test_system.py -v --tb=short 2>&1 || true
