// ─── HELPERS ───
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const el = (tag, cls, html, attrs) => { const e = document.createElement(tag); if(cls) e.className=cls; if(html!==undefined) e.innerHTML=html; if(attrs) Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v)); return e; };
const fmtDate = d => { if(!d) return '--'; const diff = Date.now()-new Date(d); if(diff<3600000) return `Hace ${Math.floor(diff/60000)}m`; if(diff<86400000) return `Hace ${Math.floor(diff/3600000)}h`; return new Date(d).toLocaleDateString(); };
const statusDot = s => ['healthy','online','available'].includes(s)?'ok':['degraded'].includes(s)?'warn':['skipped'].includes(s)?'skip':'err';

function toast(msg, type='info') {
  const id = Date.now();
  S.toasts.push({id, msg, type});
  render();
  setTimeout(() => { S.toasts = S.toasts.filter(t=>t.id!==id); render(); }, 5000);
}

function setTab(t) { S.tab=t; S.selModel=null; S.selDebate=null; render(); }
function toggleDemo() { S.demo=!S.demo; toast(S.demo?'Demo mode ON':'Live mode', S.demo?'warn':'ok'); fetchData(); }

// ─── FETCH ───
async function fetchData() {
  if(S.demo) {
    S.health=M_HEALTH; S.debates=M_DEBATES; S.reps=M_REPS; S.cache=M_CACHE; S.trib=M_TRIB; S.analytics=M_ANALYTICS; S.worker=M_WORKER;
    render(); return;
  }
  try {
    const [h,d,r,c,t,a,w] = await Promise.allSettled([
      fetch(`${BASE}/health`).then(r=>r.json()),
      fetch(`${BASE}/api/v1/debates/list`).then(r=>r.json()),
      fetch(`${BASE}/api/v1/debates/reputation`).then(r=>r.json()),
      fetch(`${BASE}/api/v1/cache/stats`).then(r=>r.json()),
      fetch(`${BASE}/api/v1/system/tribunal/config`).then(r=>r.json()),
      fetch(`${BASE}/api/v1/system/analytics`).then(r=>r.json()),
      fetch(`${BASE}/api/v1/system/worker/services`).then(r=>r.json()),
    ]);
    if(h.status==='fulfilled') S.health=h.value;
    if(d.status==='fulfilled') S.debates=d.value?.sessions||[];
    if(r.status==='fulfilled') S.reps=r.value?.reputations||{};
    if(c.status==='fulfilled') S.cache=c.value;
    if(t.status==='fulfilled') S.trib=t.value;
    if(a.status==='fulfilled') S.analytics=a.value;
    if(w.status==='fulfilled') S.worker=w.value;
    render();
  } catch(e) { S.error=e.message; render(); }
}

// ─── RENDER ───
function render() {
  const app = $('#app');
  app.innerHTML = `
    ${topbar()}
    <div class="main">${tabContent()}</div>

}

function donutChart(data) {
  const total = data.reduce((s,d)=>s+d.v,0);
  let cum = 0;
  const grad = data.map(d => { const pct = (d.v/total)*100; const stop = `${cum}% ${cum+pct}%`; cum+=pct; return `${d.c} ${stop}`; }).join(', ');
  return `<div class="donut-wrap">
    <div class="donut" style="background:conic-gradient(${grad})"></div>
    <div class="donut-legend">${data.map(d=>`<div class="legend-item"><span class="legend-dot" style="background:${d.c}"></span>${d.name}: ${d.v}</div>`).join('')}</div>
  </div>`;
}

        ${Object.entries(t.roles||{}).map(([role,data])=>`<div style="margin-bottom:16"><div style="font-size:12px;font-weight:600;text-transform:capitalize;color:var(--violet);margin-bottom:8px">${role}</div>
          <div class="sn"><span>Principal</span><span style="font-family:var(--mono);font-size:11px">${data.primary?.model}</span></div>
          ${(data.fallbacks||[]).map((fb,i)=>`<div class="sn" style="margin-left:16"><span style="font-size:10px">FB ${i+1}</span><span style="font-family:var(--mono);font-size:10px">${fb.model}</span></div>`).join('')}
        </div>`).join('')}
        <div class="sn"><span>Max Iter</span><span style="font-family:var(--mono)">${t.maxIterations}</span></div>
        <div class="sn"><span>Cloud FB</span><span style="color:${t.cloudFallbackEnabled?'var(--green)':'var(--red)'}">${t.cloudFallbackEnabled?'✓ Sí':'✗ No'}</span></div>
      </div>
      <div class="panel"><div class="panel-title">📜 Veredictos</div>
        ${verdicts.length===0?'<div class="empty"><div>Sin veredictos</div></div>':''}
        ${verdicts.map(v=>`<div class="sn" style="cursor:pointer" data-view="${v.session_id}"><div><div style="font-size:11px;font-weight:500">${v.topic?.substring(0,50)}...</div><div style="font-size:10px;color:var(--muted)">${fmtDate(v.created_at)}</div></div><span class="ds ${v.status}">${v.status}</span></div>`).join('')}
      </div>
    </div>
    <div class="panel" style="margin-top:16"><div class="panel-title">🧪 Simular Tribunal</div>
      <textarea class="inp" rows="3" placeholder="Posición controvertida..." data-siminput></textarea>
      <button class="btn btn-pri" style="margin-top:12" data-simbtn>Simular Tribunal</button>
    </div>
  </div>`;
}

// ─── TAB 5: MODELS ───
function tabModels() {
  const providers = [];
  const svc = S.health?.services||{};
  const addP = (name, status, models, node) => { if(models?.length) providers.push({name,status,models:models.map(m=>({name,rep:S.reps[m]?.global||0})),node}); };
  addP('OLLAMA', svc.ollama?.status, svc.ollama?.models, 'LOCAL');
  addP('LM STUDIO', svc.lm_studio?.status, svc.lm_studio?.models, 'LOCAL');
  addP('GROQ', svc.groq?.status, svc.groq?.models, 'CLOUD');
  addP('GEMINI', svc.gemini?.status, svc.gemini?.models, 'CLOUD');
  addP('OPENROUTER', svc.openrouter?.status, svc.openrouter?.models, 'CLOUD');

  const sel = S.selModel ? S.reps[S.selModel] : null;

  return `<div class="g2">
    <div>
      ${providers.map(p=>`<div class="panel"><div class="panel-title">▼ ${p.name} (${p.node.toLowerCase()}) <span class="sdot ${statusDot(p.status)}" style="margin-left:8px"></span><span style="font-size:10px;color:var(--muted);margin-left:4px">${p.status?.toUpperCase()}</span></div>
        ${p.models.map(m=>`<div class="sn" style="cursor:pointer;${S.selModel===m.name?'border:1px solid var(--green)':''}" data-model="${m.name}"><span style="font-family:var(--mono);font-size:11px">${m.name}</span><span style="font-family:var(--mono);font-size:11px;color:${m.rep>0?'var(--green)':'var(--muted)'}">Rep: ${m.rep>0?m.rep.toFixed(1):'N/A'}</span></div>`).join('')}
      </div>`).join('')}
    </div>
    <div>
      ${S.selModel?`<div class="panel">
        <div class="panel-title">${S.selModel} <span class="ds running">ACTIVO</span></div>
        <div style="margin-bottom:16"><div style="font-size:12px;color:var(--muted);margin-bottom:12">REPUTACIÓN EMA</div>
          ${['tsa','iid','pvt'].map(k=>{const v=sel?.[k]||0;const labels={tsa:'TSA (Coherencia)',iid:'IID (Info Density)',pvt:'PVT (Veracidad)'};return`<div style="margin-bottom:8"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2"><span>${labels[k]}</span><span style="font-family:var(--mono);color:var(--green)">${v.toFixed(1)}</span></div><div class="rb"><div class="rf" style="width:${v*10}%"></div></div></div>`}).join('')}
          <div style="margin-top:8;display:flex;justify-content:space-between;font-size:11px"><span>Score Global</span><span style="font-family:var(--mono);color:var(--green);font-weight:600">${(sel?.global||0).toFixed(1)}</span></div>
        </div>
        <div style="margin-bottom:16"><div style="font-size:12px;color:var(--muted);margin-bottom:8">ESTADÍSTICAS</div>
          <div class="sn"><span>Debates</span><span style="font-family:var(--mono)">${sel?.debates||0}</span></div>
          <div class="sn"><span>Victorias</span><span style="font-family:var(--mono);color:var(--green)">${sel?.wins||0}</span></div>
        </div>
      </div>`:`<div class="panel"><div class="empty"><div class="empty-i">🧬</div><div>Selecciona un modelo</div></div></div>`}
      <div class="panel" style="margin-top:12"><div class="panel-title">🔧 Worker Services</div>
        ${S.worker?`<div class="sn"><span>IP</span><span style="font-family:var(--mono)">${S.worker.worker_ip||'192.168.1.44'}</span></div>
          ${Object.entries(S.worker.services||{}).map(([svc,data])=>`<div class="sn"><span>${svc}</span><div style="display:flex;align-items:center;gap:8px"><span class="sdot ${data.status==='running'?'ok':'err'}"></span><span style="font-family:var(--mono);font-size:10px">${data.status}</span><button class="dbtn btn-sm" data-launch-svc="${svc}">Launch</button></div></div>`).join('')}`:'<div class="sk" style="height:100px"></div>'}
      </div>
    </div>
  </div>`;
}

// ─── TAB 6: HISTORY ───
function tabHistory() {
  const filtered = S.debates.filter(h => {
    if(S.hFilter.status!=='all' && h.status!==S.hFilter.status) return false;
    if(S.hFilter.search && !h.topic?.toLowerCase().includes(S.hFilter.search.toLowerCase())) return false;
    return true;
  });

  return `<div>
    <div class="fb">
      <input class="inp" placeholder="🔍 Buscar..." value="${S.hFilter.search}" data-hsearch>
      <select class="inp" style="max-width:140px" data-hstatus><option value="all" ${S.hFilter.status==='all'?'selected':''}>Todos</option><option value="completed" ${S.hFilter.status==='completed'?'selected':''}>Completados</option><option value="running" ${S.hFilter.status==='running'?'selected':''}>En curso</option><option value="paused" ${S.hFilter.status==='paused'?'selected':''}>Pausados</option><option value="failed" ${S.hFilter.status==='failed'?'selected':''}>Fallidos</option></select>
      <span style="font-size:12px;color:var(--muted)">${filtered.length} debates</span>
    </div>
    <div class="panel"><table><thead><tr><th>ID</th><th>Pregunta</th><th>Estado</th><th>Turnos</th><th>Fecha</th><th>Acciones</th></tr></thead><tbody>
      ${filtered.length===0?'<tr><td colspan="6"><div class="empty"><div>Sin debates</div></div></td></tr>':''}
      ${filtered.map(h=>`<tr><td style="font-family:var(--mono);font-size:10px">${h.session_id?.slice(0,8)}</td><td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.topic}</td><td><span class="ds ${h.status}">${h.status}</span></td><td style="font-family:var(--mono);font-size:11px">${h.turns_completed}/${h.total_turns}</td><td style="font-size:11px">${fmtDate(h.created_at)}</td><td><div style="display:flex;gap:4px">
        <button class="dbtn btn-sm" data-view="${h.session_id}">👁</button>
        <button class="dbtn btn-sm" data-exp="${h.session_id}">📥</button>
        ${h.status==='completed'?`<button class="dbtn btn-sm" data-cont="${h.session_id}">🔄</button>`:''}
      </div></td></tr>`).join('')}
    </tbody></table></div>
  </div>`;
}

function detailPanel() {
  const d = S.debates.find(x=>x.session_id===S.selDebate);
  if(!d) return '';
  return `<div class="dp"><button class="dp-x" data-close-dp>✕</button>
    <div style="margin-bottom:16"><div style="font-size:16px;font-weight:600;margin-bottom:8px">${d.topic}</div><span class="ds ${d.status}">${d.status}</span></div>
    <div style="margin-bottom:16"><div style="font-size:12px;color:var(--muted);margin-bottom:8">EXPORTAR</div>
      <div style="display:flex;gap:6px"><button class="btn btn-sm btn-sec" data-exp-json>📥 JSON</button><button class="btn btn-sm btn-sec" data-exp-md>📄 Markdown</button><button class="btn btn-sm btn-sec" data-exp-pdf>🖨️ PDF</button></div>
    </div>
    ${d.status==='completed'?`<button class="btn btn-sm btn-pri" style="margin-bottom:16;width:100%" data-cont-debate>🔄 Continuar Debate</button>`:''}
    <div style="background:var(--bg-surface);border-radius:8px;padding:12px;font-family:var(--mono);font-size:11;white-space:pre-wrap;max-height:400;overflow-y:auto;line-height:1.6">
# ${d.topic}

${(d.models||[]).map(m=>`## ${m}\nParticipante en el debate.\n`).join('\n---\n')}
    </div>
  </div>`;
}

function streamBar() {
  if(!S.streamId) return '';
  const last = S.streamMsgs[S.streamMsgs.length-1];
  return `<div class="stream"><div style="display:flex;align-items:center;gap:6px;color:var(--green)"><span class="dot" style="width:6px;height:6px"></span>STREAM: ${S.streamId.slice(0,8)}...</div><div class="stream-text">${last?`[${last.agent||'?'}] ${last.content?.substring(0,120)||''}`:'Esperando...'}</div><span style="color:var(--muted);font-size:10px">${S.streamMsgs.length} msgs</span></div>`;
}

function toasts() {
  if(!S.toasts.length) return '';
  return `<div class="toasts">${S.toasts.map(t=>`<div class="toast ${t.type}"><span>${t.msg}</span></div>`).join('')}</div>`;
}

function settingsDrawer() {
  return `<div class="overlay" data-close-settings></div><div class="drawer">
    <button class="drawer-x" data-close-settings>✕</button>
    <div class="drawer-title">CONFIGURACIÓN GLOBAL</div>
    <div style="margin-bottom:16"><label class="lbl">Backend URL</label><input class="inp" value="${BASE}" disabled></div>
    <div style="margin-bottom:16"><label class="lbl">Polling: ${S.interval/1000}s</label><div class="slc"><input type="range" class="sl" min="2" max="30" value="${S.interval/1000}" data-pollint><span class="sv">${S.interval/1000}s</span></div></div>
    <div class="cb"><input type="checkbox" id="ws-auto" ${S.wsOk?'checked':''}><label for="ws-auto">WebSocket auto</label></div>
    <div class="cb" style="margin-top:16"><input type="checkbox" id="stream-tok" checked><label for="stream-tok">Tokens en tiempo real</label></div>
  </div>`;
}

// ─── EVENT BINDING ───
function bindEvents() {
  // Tabs
  $$('.tab').forEach(b => b.onclick = () => setTab(b.dataset.tab));
  $('[data-tab2]') && ($('[data-tab2]').onclick = () => setTab('launcher'));

  // Demo toggle
  $('[data-demo]') && ($('[data-demo]').onclick = toggleDemo);

  // Settings
  $('[data-settings]') && ($('[data-settings]').onclick = () => { S.settingsOpen=true; render(); });
  $$('[data-close-settings]').forEach(b => b.onclick = () => { S.settingsOpen=false; render(); });

  // Close detail panel
  $$('[data-close-dp]').forEach(b => b.onclick = () => { S.selDebate=null; render(); });

  // View debate
  $$('[data-view]').forEach(b => b.onclick = () => { S.selDebate=b.dataset.view; render(); });

  // Model select
  $$('[data-model]').forEach(b => b.onclick = () => { S.selModel=b.dataset.model; render(); });

  // Export
  $$('[data-exp]').forEach(b => b.onclick = () => window.open(`${BASE}/api/v1/debates/${b.dataset.exp}/export/json`,'_blank'));

  // Continue debate
  $$('[data-cont]').forEach(b => b.onclick = () => {
    if(!S.demo) fetch(`${BASE}/api/v1/debates/${b.dataset.cont}/continue`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(()=>toast('Debate continuado','ok'));
    else toast('Debate continuado (demo)','ok');
  });

  // Debate type
  $$('[data-dtype]').forEach(b => b.onclick = () => { S.launch.type=b.dataset.dtype; if(b.dataset.dtype==='chat'){S.launch.type='chat';render();} else {S.launch.step=1;render();} });

  // Wizard navigation
  $('[data-next]') && ($('[data-next]').onclick = () => { if(S.launch.step<3){S.launch.step++;render();} });
  $('[data-prev]') && ($('[data-prev]').onclick = () => { if(S.launch.step>1){S.launch.step--;render();} });

  // Launch topic
  $('[data-ltopic]') && ($('[data-ltopic]').oninput = e => { S.launch.topic=e.target.value; });
  $('[data-lctx]') && ($('[data-lctx]').oninput = e => { S.launch.context=e.target.value; });
  $$('[data-llang]').forEach(b => b.onchange = () => { S.launch.lang=b.dataset.llang; });

  // Toggle model
  $$('[data-tmodel]').forEach(b => b.onclick = () => {
    const name = b.dataset.tmodel;
    const exists = S.launch.models.find(m=>m.name===name);
    if(exists) S.launch.models = S.launch.models.filter(m=>m.name!==name);
    else S.launch.models.push({name, temp:0.7, tokens:2048, role:'analyst'});
    render();
  });

  // Model config sliders
  $$('[data-mcfg]').forEach(s => s.oninput = () => {
    const [name, field] = s.dataset.mcfg.split('|');
    const m = S.launch.models.find(x=>x.name===name);
    if(m) { m[field] = parseFloat(s.value); render(); }
  });
  $$('[data-mrole]').forEach(s => s.onchange = () => {
    const m = S.launch.models.find(x=>x.name===s.dataset.mrole);
    if(m) m.role = s.value;
  });

  // Launcher checkboxes
  $$('[data-lchk]').forEach(cb => cb.onchange = () => { S.launch[cb.dataset.lchk]=cb.checked; });
  $('[data-lrounds]') && ($('[data-lrounds]').onchange = e => { S.launch.rounds=parseInt(e.target.value); });

  // Launch debate
  $('[data-launch]') && ($('[data-launch]').onclick = () => {
    toast('🚀 Debate lanzado','ok');
    S.launch={step:1,type:'sequential',topic:'',context:'',lang:'es',models:[],rounds:3,conv:true,cache:true,reductio:true,trib:true,expJson:true,expMd:true};
    setTab('command');
  });

  // Chat
  $('[data-csend]') && ($('[data-csend]').onclick = sendChat);
  $('[data-cinput]') && ($('[data-cinput]').onkeydown = e => { if(e.key==='Enter') sendChat(); });
  $('[data-cengine]') && ($('[data-cengine]').onchange = e => { S.chatEngine=e.target.value; });
  $('[data-cmodel]') && ($('[data-cmodel]').oninput = e => { S.chatModel=e.target.value; });

  // Polling
  $('[data-pollon]') && ($('[data-pollon]').onchange = e => { S.pollOn=e.target.checked; });
  $('[data-pollint]') && ($('[data-pollint]').oninput = e => { S.interval=parseInt(e.target.value)*1000; });
  $('[data-refresh]') && ($('[data-refresh]').onclick = fetchData);

  // History filter
  $('[data-hsearch]') && ($('[data-hsearch]').oninput = e => { S.hFilter.search=e.target.value; render(); });
  $('[data-hstatus]') && ($('[data-hstatus]').onchange = e => { S.hFilter.status=e.target.value; render(); });

  // Tribunal sim
  $('[data-simbtn]') && ($('[data-simbtn]').onclick = () => { toast('Simulación iniciada','info'); S.launch={...S.launch,type:'tribunal',step:3}; setTab('launcher'); });

  // Cache actions
  $('[data-inv]') && ($('[data-inv]').onclick = () => { if(!S.demo) fetch(`${BASE}/api/v1/cache/invalidate`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(()=>toast('Cache invalidado','ok')); else toast('Cache invalidado (demo)','ok'); });
  $('[data-clean]') && ($('[data-clean]').onclick = () => { if(!S.demo) fetch(`${BASE}/api/v1/cache/cleanup`,{method:'POST'}).then(()=>toast('Cache limpiado','ok')); else toast('Cache limpiado (demo)','ok'); });

  // Worker service launch
  $$('[data-launch-svc]').forEach(b => b.onclick = () => {
    if(!S.demo) fetch(`${BASE}/api/v1/system/worker/services/launch`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service:b.dataset.launchSvc})}).then(()=>toast(`${b.dataset.launchSvc} launching...`,'ok'));
    else toast(`${b.dataset.launchSvc} launching (demo)`,'ok');
  });

  // Export from detail
  $('[data-exp-json]') && ($('[data-exp-json]').onclick = () => window.open(`${BASE}/api/v1/debates/${S.selDebate}/export/json`,'_blank'));
  $('[data-exp-md]') && ($('[data-exp-md]').onclick = () => window.open(`${BASE}/api/v1/debates/${S.selDebate}/export/markdown`,'_blank'));
  $('[data-exp-pdf]') && ($('[data-exp-pdf]').onclick = () => window.open(`${BASE}/api/v1/debates/${S.selDebate}/export/pdf`,'_blank'));
  $('[data-cont-debate]') && ($('[data-cont-debate]').onclick = () => {
    if(!S.demo) fetch(`${BASE}/api/v1/debates/${S.selDebate}/continue`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(()=>toast('Debate continuado','ok'));
    else toast('Debate continuado (demo)','ok');
  });

  // Wake worker
  $('[data-wake]') && ($('[data-wake]').onclick = () => toast('Wake-on-LAN enviado','info'));
}

function sendChat() {
  const inp = $('[data-cinput]');
  if(!inp || !inp.value.trim()) return;
  const msg = inp.value.trim();
  S.chatMsgs.push({role:'user', content:msg});
  inp.value = '';
  render();

  if(S.demo) {
    setTimeout(() => { S.chatMsgs.push({role:'assistant', content:`Respuesta simulada de ${S.chatModel} a: "${msg}"`}); render(); }, 800);
    return;
  }

  fetch(`${BASE}/api/v1/system/chat/direct`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,model:S.chatModel,engine:S.chatEngine,temperature:0.7,max_tokens:2048})}).then(r=>r.json()).then(d=>{S.chatMsgs.push({role:'assistant',content:d.response});render();}).catch(()=>{S.chatMsgs.push({role:'assistant',content:'Error de conexión'});render();});
}

// ─── INIT ───
fetchData();
setInterval(() => { if(S.pollOn) fetchData(); }, S.interval);

// WebSocket
try {
  const ws = new WebSocket(`ws://${BASE.replace('http://','')}/ws/debate/stream`);
  ws.onopen = () => { S.wsOk=true; render(); };
  ws.onclose = () => { S.wsOk=false; render(); };
  ws.onmessage = e => { try { S.streamMsgs.push(JSON.parse(e.data)); S.streamId=S.streamId||'active'; render(); } catch(ex){} };
} catch(e) { S.wsOk=false; }

render();
</script>
</body>
</html>
