# SynapseCode — Nginx configuration
# Production server: 192.168.1.37
# Frontend: /var/www/synapsecode/
# Backend proxy: 192.168.1.43:8000

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/synapsecode;
    index index.html;
    location / {
        try_files $uri $uri/ =404;
    }
    rewrite ^/admin$ /admin.html;
    location /api/v1/ {
        proxy_pass http://192.168.1.43:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host synapsecode.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 1;
    }
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://192.168.1.43:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host synapsecode.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 1;
    }
    location /ws/ {
        proxy_pass http://192.168.1.43:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host synapsecode.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }
    access_log /var/log/nginx/synapsecode_access.log;

    location = /health {
        proxy_pass http://192.168.1.43:8000;
        proxy_http_version 1.1;
        proxy_set_header Host synapsecode.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    error_log /var/log/nginx/synapsecode_error.log warn;
}
